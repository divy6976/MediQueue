<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <rect width="800" height="340" fill="#0f0f0f"/>
  <text x="20" y="28" fill="#888888" font-family="Segoe UI, Arial, sans-serif" font-size="13">AI Triage (Gemini + Fallback)</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5b9cf5"/>
    </marker>
  </defs>

  <rect x="280" y="50" width="240" height="44" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="400" y="77" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle">POST /patient/suggest</text>

  <line x1="400" y1="94" x2="400" y2="120" stroke="#5b9cf5" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="300" y="120" width="200" height="44" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="400" y="147" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle">GEMINI_API_KEY set?</text>

  <line x1="300" y1="142" x2="120" y2="190" stroke="#666666" stroke-width="1.5"/>
  <rect x="30" y="180" width="160" height="44" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="110" y="207" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle">Rule-based triage</text>
  <text x="110" y="168" fill="#888888" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle">No key / API fail</text>

  <line x1="500" y1="142" x2="620" y2="190" stroke="#666666" stroke-width="1.5"/>
  <rect x="560" y="180" width="140" height="44" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="630" y="207" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle">Call Gemini</text>
  <text x="630" y="168" fill="#888888" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle">Yes</text>

  <line x1="630" y1="224" x2="630" y2="250" stroke="#5b9cf5" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="550" y="250" width="160" height="44" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="630" y="277" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">Parse JSON + Zod</text>

  <line x1="550" y1="272" x2="400" y2="290" stroke="#5b9cf5" stroke-width="1.5"/>
  <line x1="110" y1="224" x2="400" y2="290" stroke="#5b9cf5" stroke-width="1.5"/>
  <line x1="400" y1="290" x2="400" y2="305" stroke="#5b9cf5" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="280" y="305" width="240" height="30" rx="6" fill="#1a1a1a" stroke="#4caf50" stroke-width="1.5"/>
  <text x="400" y="325" fill="#4caf50" font-family="Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle">department + priority + reason</text>
</svg>
