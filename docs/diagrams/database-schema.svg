<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380">
  <rect width="900" height="380" fill="#0f0f0f"/>
  <text x="20" y="28" fill="#888888" font-family="Segoe UI, Arial, sans-serif" font-size="13">Database Schema</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5b9cf5"/>
    </marker>
  </defs>

  <rect x="40" y="60" width="180" height="120" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="130" y="85" fill="#5b9cf5" font-family="Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="600">PATIENTS</text>
  <text x="55" y="108" fill="#aaaaaa" font-family="Segoe UI, Arial, sans-serif" font-size="12">id, name, age</text>
  <text x="55" y="128" fill="#aaaaaa" font-family="Segoe UI, Arial, sans-serif" font-size="12">phone, chief_complaint</text>

  <line x1="220" y1="120" x2="290" y2="120" stroke="#5b9cf5" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="290" y="88" width="70" height="28" rx="14" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="325" y="106" fill="#cccccc" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">has</text>

  <line x1="360" y1="120" x2="400" y2="120" stroke="#5b9cf5" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="400" y="60" width="200" height="120" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="500" y="85" fill="#5b9cf5" font-family="Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="600">TOKENS</text>
  <text x="415" y="108" fill="#aaaaaa" font-family="Segoe UI, Arial, sans-serif" font-size="12">token_number, department</text>
  <text x="415" y="128" fill="#aaaaaa" font-family="Segoe UI, Arial, sans-serif" font-size="12">status, priority, created_at</text>

  <line x1="600" y1="120" x2="640" y2="120" stroke="#5b9cf5" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="640" y="88" width="70" height="28" rx="14" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="675" y="106" fill="#cccccc" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">tracks</text>

  <line x1="710" y1="120" x2="750" y2="120" stroke="#5b9cf5" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="750" y="60" width="130" height="120" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="815" y="85" fill="#5b9cf5" font-family="Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="600">LOGS</text>
  <text x="765" y="108" fill="#aaaaaa" font-family="Segoe UI, Arial, sans-serif" font-size="12">issue_time</text>
  <text x="765" y="128" fill="#aaaaaa" font-family="Segoe UI, Arial, sans-serif" font-size="12">call_time, end_time</text>

  <rect x="400" y="240" width="180" height="100" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="490" y="265" fill="#5b9cf5" font-family="Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="600">USERS</text>
  <text x="415" y="288" fill="#aaaaaa" font-family="Segoe UI, Arial, sans-serif" font-size="12">name, role (doctor/admin)</text>
  <text x="415" y="308" fill="#aaaaaa" font-family="Segoe UI, Arial, sans-serif" font-size="12">department assignment</text>

  <line x1="490" y1="240" x2="490" y2="210" stroke="#666666" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="430" y="210" width="120" height="24" rx="12" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="490" y="226" fill="#888888" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle">assigned to dept</text>
</svg>
