<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <rect width="900" height="320" fill="#0f0f0f"/>
  <text x="20" y="28" fill="#888888" font-family="Segoe UI, Arial, sans-serif" font-size="13">End-to-End User Journey</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5b9cf5"/>
    </marker>
  </defs>

  <!-- Step 1 Reception -->
  <text x="30" y="58" fill="#666666" font-family="Segoe UI, Arial, sans-serif" font-size="11">1. Reception</text>
  <rect x="30" y="65" width="110" height="36" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="85" y="88" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">Enter complaint</text>
  <line x1="140" y1="83" x2="165" y2="83" stroke="#5b9cf5" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="165" y="65" width="110" height="36" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="220" y="88" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">AI suggests</text>
  <line x1="275" y1="83" x2="300" y2="83" stroke="#5b9cf5" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="300" y="65" width="120" height="36" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="360" y="88" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">Register patient</text>
  <line x1="420" y1="83" x2="445" y2="83" stroke="#5b9cf5" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="445" y="65" width="120" height="36" rx="6" fill="#1a1a1a" stroke="#4caf50" stroke-width="1.5"/>
  <text x="505" y="88" fill="#4caf50" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">Token DENT-004</text>

  <!-- Step 2 Display -->
  <line x1="505" y1="101" x2="505" y2="140" stroke="#5b9cf5" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="30" y="148" fill="#666666" font-family="Segoe UI, Arial, sans-serif" font-size="11">2. Display Board</text>
  <rect x="400" y="140" width="130" height="36" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="465" y="163" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">SSE live update</text>
  <line x1="530" y1="158" x2="560" y2="158" stroke="#5b9cf5" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="560" y="140" width="120" height="36" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="700" y="163" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">Queue visible</text>

  <!-- Step 3 Doctor -->
  <line x1="620" y1="176" x2="620" y2="210" stroke="#5b9cf5" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="30" y="218" fill="#666666" font-family="Segoe UI, Arial, sans-serif" font-size="11">3. Doctor</text>
  <rect x="560" y="210" width="100" height="36" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="610" y="233" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">Call Next</text>
  <line x1="660" y1="228" x2="685" y2="228" stroke="#5b9cf5" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="685" y="210" width="110" height="36" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="740" y="233" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">Consult</text>
  <line x1="795" y1="228" x2="820" y2="228" stroke="#5b9cf5" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="820" y="210" width="70" height="36" rx="6" fill="#1a1a1a" stroke="#4caf50" stroke-width="1.5"/>
  <text x="855" y="233" fill="#4caf50" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">DONE</text>

  <!-- Step 4 Patient -->
  <line x1="505" y1="101" x2="200" y2="140" stroke="#666666" stroke-width="1.5"/>
  <text x="30" y="278" fill="#666666" font-family="Segoe UI, Arial, sans-serif" font-size="11">4. Patient</text>
  <rect x="30" y="250" width="120" height="36" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="90" y="273" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">Track token</text>
  <line x1="150" y1="268" x2="175" y2="268" stroke="#5b9cf5" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="175" y="250" width="150" height="36" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="250" y="273" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">See queue position</text>
</svg>
