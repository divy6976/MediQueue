<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="900" height="240">
  <rect width="900" height="240" fill="#0f0f0f"/>
  <text x="20" y="28" fill="#888888" font-family="Segoe UI, Arial, sans-serif" font-size="13">Call Next Patient</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5b9cf5"/>
    </marker>
  </defs>

  <rect x="30" y="90" width="90" height="44" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="75" y="117" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle">Doctor</text>

  <line x1="120" y1="112" x2="155" y2="112" stroke="#666666" stroke-width="1.5"/>
  <rect x="155" y="98" width="130" height="28" rx="14" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="220" y="116" fill="#cccccc" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle">POST /queue/call-next</text>

  <line x1="285" y1="112" x2="320" y2="112" stroke="#5b9cf5" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="320" y="90" width="120" height="44" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="380" y="117" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle">callNext()</text>

  <line x1="440" y1="112" x2="475" y2="112" stroke="#666666" stroke-width="1.5"/>
  <rect x="475" y="98" width="180" height="28" rx="14" fill="#1a1a1a" stroke="#ff9800" stroke-width="1.5"/>
  <text x="565" y="116" fill="#ff9800" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle">pg_advisory_xact_lock</text>

  <line x1="655" y1="112" x2="690" y2="112" stroke="#5b9cf5" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="690" y="70" width="180" height="36" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="780" y="93" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">getQueue ’ pick first</text>
  <rect x="690" y="118" width="180" height="36" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="780" y="141" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">status = IN_PROGRESS</text>

  <line x1="780" y1="154" x2="780" y2="185" stroke="#5b9cf5" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="690" y="185" width="180" height="44" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="780" y="212" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle">notifyQueueUpdate ’ Redis</text>

  <line x1="690" y1="207" x2="75" y2="134" stroke="#5b9cf5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="30" y="170" width="90" height="44" rx="6" fill="#1a1a1a" stroke="#4caf50" stroke-width="1.5"/>
  <text x="75" y="197" fill="#4caf50" font-family="Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle">200 OK</text>
</svg>
