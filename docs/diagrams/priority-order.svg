  <rect x="410" y="60" width="140" height="44" rx="6" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
  <text x="480" y="87" fill="#e8e8e8" font-family="Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle">NORMAL (1)</text>
  <text x="580" y="87" fill="#666666" font-family="Segoe UI, Arial, sans-serif" font-size="12">highest first ’</text>
